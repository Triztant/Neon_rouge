<html lang="en">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4f0;
      --surface: #ebebе5;
      --panel: #e8e7e2;
      --border: rgba(0,0,0,0.08);
      --text: #111;
      --muted: #888;
      --faint: #bbb;
      --accent-green: #2e7d5a;
      --accent-red: #c94040;
      --accent-orange: #d4713a;
      --accent-pink: #d4607a;
      --accent-yellow: #c8a840;
      --radius: 14px;
      --font: 'DM Sans', sans-serif;
      --mono: 'DM Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 18px 28px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    .logo-mark {
      width: 38px; height: 38px;
      border: 1.5px solid var(--accent-red);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: var(--accent-red);
      font-size: 18px;
    }

    .logo-text {
      font-size: 17px;
      font-weight: 500;
      letter-spacing: -0.02em;
      line-height: 1.15;
    }

    .logo-text span { display: block; }

    nav {
      margin-left: auto;
      display: flex; gap: 6px;
    }

    nav button {
      background: none;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 16px;
      font-family: var(--font);
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.18s;
    }

    nav button:hover { color: var(--text); border-color: rgba(0,0,0,0.2); }

    /* ── LAYOUT ── */
    .layout {
      display: flex;
      height: 100vh;
      padding-top: 73px;
    }

    /* ── LEFT COLUMN ── */
    .sidebar {
      width: 360px;
      flex-shrink: 0;
      overflow-y: auto;
      padding: 24px 20px;
      border-right: 1px solid var(--border);
      scrollbar-width: none;
    }
    .sidebar::-webkit-scrollbar { display: none; }

    .sidebar-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--faint);
      font-family: var(--mono);
      margin-bottom: 14px;
      padding-left: 4px;
    }

    /* active user row (highlighted, no border) */
    .user-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border: 1.5px solid transparent;
      border-radius: var(--radius);
      cursor: pointer;
      transition:
        background 0.15s,
        border-color 0.15s,
        opacity 0.24s ease,
        transform 0.24s ease;
      margin-bottom: 6px;
      user-select: none;
    }

    .user-row:hover { background: rgba(0,0,0,0.04); }

    .user-row.scroll-fade {
      opacity: 0;
      transform: translateY(-8px);
      pointer-events: none;
    }

    .user-row.active {
      background: rgba(0,0,0,0.04);
    }

    .user-row.active .user-name { font-weight: 500; }

    /* dot */
    .dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-green  { background: var(--accent-green); }
    .dot-red    { background: var(--accent-red); }
    .dot-orange { background: var(--accent-orange); }
    .dot-pink   { background: var(--accent-pink); }
    .dot-yellow { background: var(--accent-yellow); }

    /* border tints for user rows */
    .user-row[data-color="green"]  { border-color: rgba(46,125,90,0.35); }
    .user-row[data-color="red"]    { border-color: rgba(201,64,64,0.35); }
    .user-row[data-color="orange"] { border-color: rgba(212,113,58,0.35); }
    .user-row[data-color="pink"]   { border-color: rgba(212,96,122,0.35); }
    .user-row[data-color="yellow"] { border-color: rgba(200,168,64,0.35); }

    .user-name {
      flex: 1;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .user-date {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }

    /* ── RIGHT PANEL ── */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 32px 36px;
      scrollbar-width: none;
    }
    .main::-webkit-scrollbar { display: none; }

    .panel {
      background: #e9e8e3;
      border-radius: 18px;
      padding: 28px 32px;
      max-width: 700px;
      opacity: 0;
      transform: translateY(-10px);
      transition: opacity 0.42s ease, transform 0.42s ease;
    }

    .panel.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .panel-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 22px;
      gap: 20px;
    }

    .panel-artist {
      font-size: 22px;
      font-weight: 500;
      letter-spacing: -0.02em;
    }

    .panel-meta-top {
      text-align: right;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }

    /* tracklist */
    .tracklist {
      list-style: none;
      margin-bottom: 20px;
    }

    .track {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(0,0,0,0.07);
      cursor: pointer;
      transition: background 0.13s;
      border-radius: 6px;
      padding-left: 8px;
      padding-right: 8px;
      margin: 0 -8px;
    }

    .track:last-child { border-bottom: none; }

    .track:hover {
      background: rgba(0,0,0,0.07);
    }

    .track-num {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--faint);
      width: 18px;
      text-align: right;
      flex-shrink: 0;
    }

    .track-title {
      flex: 1;
      font-size: 13.5px;
      font-weight: 400;
    }

    .track-play {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.15);
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }

    .track:hover .track-play { opacity: 1; }

    .track-play svg { width: 9px; height: 9px; fill: var(--text); }

    /* embed area */
    .embed-area {
      margin-top: 16px;
      margin-bottom: 20px;
      border-radius: 12px;
      overflow: hidden;
      display: none;
    }

    .embed-area.active { display: block; }

    .embed-area iframe {
      width: 100%;
      border: none;
      border-radius: 12px;
    }

    /* panel footer */
    .panel-footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      border-top: 1px solid rgba(0,0,0,0.07);
      padding-top: 16px;
    }

    .panel-desc {
      font-size: 12.5px;
      color: var(--muted);
      line-height: 1.65;
      max-width: 340px;
    }

    .panel-stats {
      font-family: var(--mono);
      font-size: 10.5px;
      color: var(--faint);
      text-align: right;
      white-space: nowrap;
      line-height: 1.8;
    }

    /* empty state */
    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 60vh;
      color: var(--faint);
      font-size: 13px;
      letter-spacing: 0.05em;
      font-family: var(--mono);
      text-align: center;
    }

    /* ── MOBILE ── */
    @media (max-width: 720px) {
      header { padding: 14px 16px; }

      .layout {
        flex-direction: column;
        height: auto;
        padding-top: 65px;
      }

      .sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding: 16px 14px;
        overflow-y: visible;
      }

      .main {
        display: none;
      }

      .sidebar .panel {
        margin: 8px 0 14px;
        overflow: hidden;
        max-height: 0;
        padding-top: 0;
        padding-bottom: 0;
        opacity: 0;
        transform: translateY(-12px);
        transition:
          max-height 0.75s cubic-bezier(0.22, 1, 0.36, 1),
          padding-top 0.75s cubic-bezier(0.22, 1, 0.36, 1),
          padding-bottom 0.75s cubic-bezier(0.22, 1, 0.36, 1),
          opacity 0.5s ease,
          transform 0.75s cubic-bezier(0.22, 1, 0.36, 1);
      }

      .sidebar .panel.visible {
        padding-top: 20px;
        padding-bottom: 20px;
        opacity: 1;
        transform: translateY(0);
      }

      .panel {
        max-width: 100%;
        padding: 20px 18px;
      }

      .panel-header {
        flex-direction: column;
        gap: 8px;
      }

      .panel-meta-top { text-align: left; }

      .panel-footer {
        flex-direction: column;
        gap: 12px;
      }

      .panel-stats { text-align: left; }

      nav { display: none; }
    }
  </style>
</head>

/* ─────────────────────────────────────────────
   HELPERS
───────────────────────────────────────────── */
function formatDate(str) {
  // already DD/MM/YY format
  return str;
}

function getSpotifyTrackId(url) {
  const m = url.match(/track\/([A-Za-z0-9]+)/);
  return m ? m[1] : null;
}

function buildEmbedUrl(track) {
  if (track.type === "spotify_track") {
    const id = getSpotifyTrackId(track.url);
    return id ? `https://open.spotify.com/embed/track/${id}?utm_source=generator&theme=0` : null;
  }
  return null;
}

/* ─────────────────────────────────────────────
   RENDER SIDEBAR
───────────────────────────────────────────── */
const sidebar = document.getElementById("sidebar");
const label = document.createElement("p");
label.className = "sidebar-label";
label.textContent = "Curated sets";
sidebar.appendChild(label);

users.forEach((user, i) => {
  const row = document.createElement("div");
  row.className = "user-row";
  row.dataset.color = user.color;
  row.dataset.id = user.id;
  row.setAttribute("role", "button");
  row.setAttribute("tabindex", "0");
  row.innerHTML = `
    <span class="dot dot-${user.color}"></span>
    <span class="user-name">${user.name}</span>
    <span class="user-date">${user.date}</span>
  `;
  row.addEventListener("click", () => selectUser(user.id, row));
  row.addEventListener("keydown", e => { if (e.key === "Enter") selectUser(user.id, row); });
  sidebar.appendChild(row);
});

/* ─────────────────────────────────────────────
   SELECT USER
───────────────────────────────────────────── */

let activeEmbedArea = null;
let activeUserId = null;
const mobilePanels = new Map();

function selectUser(id, clickedRow = null) {
  const user = users.find(u => u.id === id);
  if (!user) return;

  const isMobile = window.innerWidth <= 720;
  const empty = document.getElementById("empty");
  const activeRow = document.querySelector(`[data-id="${id}"]`);
  const targetRow = clickedRow || activeRow;

  empty.style.display = "none";

  if (isMobile && targetRow) {
    let panel = mobilePanels.get(id);

    if (!panel) {
      panel = document.createElement("div");
      panel.className = "panel";
      panel.dataset.userId = id;
      panel.style.display = "none";
      panel.innerHTML = buildPanel(user);
      mobilePanels.set(id, panel);
    }

    if (panel.dataset.animating === "true") return;

    const isOpen = panel.classList.contains("visible");

    if (isOpen) {
      panel.dataset.animating = "true";
      panel.style.transitionDuration = "0.32s, 0.32s, 0.32s, 0.22s, 0.32s";
      panel.style.maxHeight = `${panel.scrollHeight}px`;

      requestAnimationFrame(() => {
        panel.classList.remove("visible");
        panel.style.maxHeight = "0px";
      });

      targetRow.classList.remove("active");

      window.setTimeout(() => {
        panel.style.display = "none";
        panel.style.maxHeight = "";
        panel.style.transitionDuration = "";
        panel.dataset.animating = "false";
      }, 340);

      return;
    }

    targetRow.classList.add("active");
    targetRow.insertAdjacentElement("afterend", panel);

    panel.dataset.animating = "true";
    panel.style.display = "block";
    panel.style.maxHeight = "0px";
    panel.classList.remove("visible");

    requestAnimationFrame(() => {
      panel.classList.add("visible");
      panel.style.maxHeight = `${panel.scrollHeight}px`;

      window.setTimeout(() => {
        panel.style.maxHeight = "none";
        panel.dataset.animating = "false";
      }, 760);
    });

    return;
  }

  const panel = document.getElementById("panel");

  if (activeUserId === id && panel.classList.contains("visible")) {
    panel.classList.remove("visible");
    document.querySelectorAll(".user-row").forEach(r => r.classList.remove("active"));
    activeUserId = null;

    window.setTimeout(() => {
      panel.style.display = "none";
      panel.innerHTML = "";
    }, 420);

    return;
  }

  document.querySelectorAll(".user-row").forEach(r => r.classList.remove("active"));
  if (activeRow) activeRow.classList.add("active");
  activeUserId = id;

  panel.dataset.userId = id;
  panel.style.display = "block";
  panel.classList.remove("visible");
  panel.innerHTML = buildPanel(user);
  document.getElementById("main").appendChild(panel);

  requestAnimationFrame(() => panel.classList.add("visible"));
}

function buildPanel(user) {
  const trackItems = user.tracks.map((t, i) => `
    <li class="track" data-index="${i}" data-url="${t.url}" data-type="${t.type}">
      <span class="track-num">${String(i + 1).padStart(2, "0")}</span>
      <span class="track-title">${t.title}</span>
      <span class="track-play">
        <svg viewBox="0 0 10 10"><polygon points="2,1 9,5 2,9"/></svg>
      </span>
    </li>
  `).join("");

  return `
    <div class="panel-header">
      <div class="panel-artist">${user.name}</div>
      <div class="panel-meta-top">
        ${user.role}<br>
        ${user.location}
      </div>
    </div>

    <div class="embed-area">
      <iframe class="spotify-embed" height="80" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
    </div>

    <ul class="tracklist">
      ${trackItems}
    </ul>

    <div class="panel-footer">
      <p class="panel-desc">${user.description}</p>
      <div class="panel-stats">
        10 Songs<br>
        Uploaded ${user.uploadDate}
      </div>
    </div>
  `;
}

/* ─────────────────────────────────────────────
   TRACK CLICK → EMBED
───────────────────────────────────────────── */
document.addEventListener("click", e => {
  const track = e.target.closest(".track");
  if (!track) return;

  const panel = track.closest(".panel");
  if (!panel) return;

  const index = parseInt(track.dataset.index);
  const url = track.dataset.url;
  const user = users.find(u => u.id === panel.dataset.userId);
  if (!user) return;

  const t = user.tracks[index];
  const embedUrl = buildEmbedUrl(t);

  const embedArea = panel.querySelector(".embed-area");
  const iframe = panel.querySelector(".spotify-embed");

  if (embedUrl) {
    iframe.src = embedUrl;
    embedArea.classList.add("active");
    embedArea.scrollIntoView({ behavior: "smooth", block: "nearest" });

    if (window.innerWidth <= 720) {
      panel.style.maxHeight = `${panel.scrollHeight}px`;
    }
  } else {
    // fallback: open in new tab
    window.open(url, "_blank");
  }

  // highlight active track inside this panel only
  panel.querySelectorAll(".track").forEach(r => r.style.fontWeight = "");
  track.style.fontWeight = "500";
});

/* ─────────────────────────────────────────────
   SCROLL FADE NAME BOXES
───────────────────────────────────────────── */
let scrollFadeFrame = null;

function updateScrollFade() {
  scrollFadeFrame = null;

  const scrollTop = window.innerWidth <= 720
    ? window.scrollY
    : sidebar.scrollTop;

  document.querySelectorAll(".user-row").forEach(row => {
    const rowTop = window.innerWidth <= 720
      ? row.getBoundingClientRect().top
      : row.offsetTop - scrollTop;

    const shouldFade = rowTop < 92;
    row.classList.toggle("scroll-fade", shouldFade);
  });
}

function requestScrollFade() {
  if (scrollFadeFrame) return;
  scrollFadeFrame = requestAnimationFrame(updateScrollFade);
}

window.addEventListener("scroll", requestScrollFade, { passive: true });
sidebar.addEventListener("scroll", requestScrollFade, { passive: true });
window.addEventListener("resize", requestScrollFade);
updateScrollFade();

/* ─────────────────────────────────────────────
   START CLOSED
───────────────────────────────────────────── */
</script>
